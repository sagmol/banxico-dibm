<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clusters Tematicos t-SNE - DIBM Banxico</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #0d1117; color: #e6edf3;
  font-family: 'Inter', system-ui, sans-serif;
  height: 100%; overflow: hidden;
}
#wrapper { display: flex; flex-direction: column; height: 100vh; }
#header {
  background: #111720; border-bottom: 1px solid #1e2738;
  padding: 10px 18px; display: flex; align-items: center;
  gap: 14px; flex-wrap: wrap; flex-shrink: 0;
}
#title { font-size: 14px; font-weight: 600; color: #cdd9e5; letter-spacing:-0.2px; white-space:nowrap; }
#subtitle { font-size: 11px; color: #7d8590; white-space: nowrap; }
#search {
  background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
  color: #e6edf3; font-size: 12px; font-family: inherit;
  padding: 5px 12px; width: 200px; outline: none; transition: border-color .2s;
}
#search:focus { border-color: #4ECDC4; }
#search::placeholder { color: #484f58; }
.btn {
  background: #1e2738; border: 1px solid #30363d; border-radius: 6px;
  color: #9aadba; font-size: 11px; font-family: inherit; font-weight: 500;
  padding: 5px 12px; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn:hover { background: #2d3748; color: #e6edf3; border-color: #4ECDC4; }
#main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
#canvas-wrap { flex: 1; position: relative; overflow: hidden; }
#canvas-wrap svg { width: 100%; height: 100%; cursor: grab; }
#canvas-wrap svg:active { cursor: grabbing; }
#legend {
  width: 215px; background: #111720; border-left: 1px solid #1e2738;
  padding: 14px 14px 20px; overflow-y: auto; flex-shrink: 0;
}
#legend h3 {
  font-size: 10px; font-weight: 600; color: #7d8590;
  letter-spacing:.8px; text-transform:uppercase; margin-bottom:10px;
}
.legend-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 6px; border-radius: 6px; cursor: pointer;
  transition: background .15s; margin-bottom: 2px;
}
.legend-item:hover { background: rgba(255,255,255,.04); }
.legend-item.hidden { opacity: .35; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-label { font-size: 11px; color: #9aadba; line-height: 1.3; flex: 1; }
.legend-count { font-size: 10px; color: #484f58; font-weight: 500; white-space: nowrap; }
#stats {
  background: #0d1117; border: 1px solid #1e2738; border-radius: 6px;
  padding: 10px 12px; margin-bottom: 14px; font-size: 11px;
}
.stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.stat-label { color: #7d8590; }
.stat-value { color: #4ECDC4; font-weight: 600; }
#tooltip {
  position: fixed; background: rgba(13,17,23,.97);
  border: 1px solid #30363d; border-radius: 8px;
  padding: 10px 13px; font-size: 12px; max-width: 300px;
  pointer-events: none; opacity: 0; transition: opacity .12s;
  z-index: 999; line-height: 1.5;
}
#tooltip.visible { opacity: 1; }
.tt-title { color: #cdd9e5; font-weight: 500; margin-bottom: 4px; }
.tt-meta  { color: #7d8590; font-size: 11px; }
.tt-cluster {
  display: inline-block; padding: 1px 7px; border-radius: 3px;
  font-size: 10px; font-weight: 500; margin-top: 5px;
}
#loading {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
  background: #0d1117; font-size: 13px; color: #7d8590;
}
@media (max-width: 640px) {
  #legend { display: none; }
  #subtitle { display: none; }
  .chart-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  svg.chart { min-width: 480px; }
}
  .back-btn {
    position:fixed; top:14px; left:14px; z-index:9999;
    background:rgba(13,17,23,.92); border:1px solid #30363d;
    color:#4ECDC4; padding:6px 14px; border-radius:6px;
    font-size:11px; font-weight:600; text-decoration:none;
    letter-spacing:.3px; backdrop-filter:blur(4px);
    transition:border-color .2s;
  }
  .back-btn:hover { border-color:#4ECDC4; }
</style>
</head>
<body>
<a href="../index.html" class="back-btn">← Inicio</a>
<div id="wrapper">
  <div id="header">
    <div>
      <div id="title">Clusters Tematicos &mdash; Visualizacion t-SNE</div>
      <div id="subtitle">NMF &middot; 10 topicos &middot; documentos DIBM 1978&ndash;2025</div>
    </div>
    <input id="search" type="text" placeholder="Buscar paper...">
    <button class="btn" id="btn-all">Todos</button>
    <button class="btn" id="btn-reset-zoom">Restablecer zoom</button>
  </div>
  <div id="main">
    <div id="canvas-wrap">
      <div id="loading">Cargando datos t-SNE...</div>
      <svg id="svg"></svg>
    </div>
    <div id="legend">
      <div id="stats">
        <div class="stat-row">
          <span class="stat-label">Documentos</span>
          <span class="stat-value" id="st-total">&mdash;</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Visibles</span>
          <span class="stat-value" id="st-visible">&mdash;</span>
        </div>
      </div>
      <h3>Topicos NMF</h3>
      <div id="legend-items"></div>
    </div>
  </div>
</div>
<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-meta"  id="tt-meta"></div>
  <div class="tt-cluster" id="tt-cluster"></div>
</div>

<script>
var DATA_URL = '../data/tsne_clusters.json';
var allPoints = [], clusters = [], hiddenClusters = new Set(), searchTerm = '';

var svg  = d3.select('#svg');
var g    = svg.append('g');
var zoom = d3.zoom().scaleExtent([0.25, 15]).on('zoom', function(e) { g.attr('transform', e.transform); });
svg.call(zoom);
var xScale, yScale;

function loadData() {
  d3.json(DATA_URL).then(function(data) {
    document.getElementById('loading').style.display = 'none';
    allPoints = data.points;
    clusters  = data.clusters;
    buildLegend();
    buildChart();
    updateStats();
  }).catch(function(err) {
    document.getElementById('loading').textContent = 'Error cargando tsne_clusters.json';
    console.error(err);
  });
}

function buildLegend() {
  var container = document.getElementById('legend-items');
  clusters.forEach(function(c) {
    var item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.id = c.id;
    item.innerHTML =
      '<div class="legend-dot" style="background:' + c.color + '"></div>' +
      '<span class="legend-label">' + c.nombre + '</span>' +
      '<span class="legend-count">' + c.count + '</span>';
    item.addEventListener('click', function() { toggleCluster(c.id, item); });
    container.appendChild(item);
  });
}

function toggleCluster(id, el) {
  if (hiddenClusters.has(id)) {
    hiddenClusters.delete(id); el.classList.remove('hidden');
  } else {
    hiddenClusters.add(id); el.classList.add('hidden');
  }
  applyFilters();
}

function buildChart() {
  var xs = allPoints.map(function(p) { return p.x; });
  var ys = allPoints.map(function(p) { return p.y; });
  var xExt = d3.extent(xs), yExt = d3.extent(ys);
  var xR = xExt[1] - xExt[0], yR = yExt[1] - yExt[0], pad = 0.07;
  var W = svg.node().clientWidth  || 800;
  var H = svg.node().clientHeight || 580;
  xScale = d3.scaleLinear().domain([xExt[0]-xR*pad, xExt[1]+xR*pad]).range([0, W]);
  yScale = d3.scaleLinear().domain([yExt[0]-yR*pad, yExt[1]+yR*pad]).range([H, 0]);
  var colorMap = {};
  clusters.forEach(function(c) { colorMap[c.id] = c.color; });
  g.selectAll('circle').remove();
  g.selectAll('circle')
    .data(allPoints)
    .join('circle')
      .attr('cx', function(d) { return xScale(d.x); })
      .attr('cy', function(d) { return yScale(d.y); })
      .attr('r', 5)
      .attr('fill', function(d) { return colorMap[d.cluster]; })
      .attr('fill-opacity', 0.72)
      .attr('stroke', '#0d1117')
      .attr('stroke-width', 0.8)
      .attr('data-cluster', function(d) { return d.cluster; })
      .style('cursor', 'pointer')
      .on('mousemove', onMouseMove)
      .on('mouseleave', onMouseLeave);
}

function applyFilters() {
  var term = searchTerm.toLowerCase().trim();
  g.selectAll('circle')
    .attr('display', function(d) { return hiddenClusters.has(d.cluster) ? 'none' : null; })
    .attr('fill-opacity', function(d) {
      if (hiddenClusters.has(d.cluster)) return 0;
      if (term && d.title.toLowerCase().indexOf(term) === -1) return 0.07;
      return 0.78;
    })
    .attr('r', function(d) {
      return (term && d.title.toLowerCase().indexOf(term) !== -1) ? 8 : 5;
    })
    .attr('stroke', function(d) {
      return (term && d.title.toLowerCase().indexOf(term) !== -1) ? '#fff' : '#0d1117';
    })
    .attr('stroke-width', function(d) {
      return (term && d.title.toLowerCase().indexOf(term) !== -1) ? 1.5 : 0.8;
    });
  updateStats();
}

function updateStats() {
  document.getElementById('st-total').textContent   = allPoints.length;
  document.getElementById('st-visible').textContent = allPoints.filter(function(p) { return !hiddenClusters.has(p.cluster); }).length;
}

var tooltip = document.getElementById('tooltip');
function onMouseMove(ev, d) {
  var c = clusters.find(function(c) { return c.id === d.cluster; }) || {};
  var titleEl = document.getElementById('tt-title');
  titleEl.textContent = d.title.length > 72 ? d.title.slice(0, 72) + '...' : d.title;
  document.getElementById('tt-meta').textContent = 'Anio: ' + (d.year || '?');
  var badge = document.getElementById('tt-cluster');
  badge.textContent = c.nombre || '';
  badge.style.background = (c.color || '#4ECDC4') + '22';
  badge.style.color  = c.color || '#4ECDC4';
  badge.style.border = '1px solid ' + (c.color || '#4ECDC4') + '55';
  var x = Math.min(ev.clientX + 14, window.innerWidth  - 310);
  var y = Math.min(ev.clientY - 10, window.innerHeight - 120);
  tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
  tooltip.classList.add('visible');
}
function onMouseLeave() { tooltip.classList.remove('visible'); }

document.getElementById('btn-all').addEventListener('click', function() {
  hiddenClusters.clear();
  document.querySelectorAll('.legend-item').forEach(function(el) { el.classList.remove('hidden'); });
  applyFilters();
});
document.getElementById('btn-reset-zoom').addEventListener('click', function() {
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
});
document.getElementById('search').addEventListener('input', function(e) {
  searchTerm = e.target.value;
  applyFilters();
});
window.addEventListener('resize', function() { if (xScale) buildChart(); });

loadData();
</script>
</body>
</html>
