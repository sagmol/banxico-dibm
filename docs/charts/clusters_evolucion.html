  setTimeout(function() {

      try {
        var upd = {
          paper_bgcolor: '#0d1117',
          plot_bgcolor:  '#0d1117',

        var axes = ['','2','3','4','5','6','7','8'];
        axes.forEach(function(i) {
          ['xaxis','yaxis'].forEach(function(ax) {
            var a = ax + i;
            upd[a+'.gridcolor']         = 'rgba(255,255,255,0.07)';
            upd[a+'.tickfont.color']    = '#7d8590';
            upd[a+'.title.font.color']  = '#9aadba';

    });
  }, 150);
});
