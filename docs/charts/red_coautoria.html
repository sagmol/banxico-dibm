<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Red de Coautoría — Banxico DIBM</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; color:#e6edf3; font-family:'Inter',system-ui,sans-serif; overflow:hidden; }

  #ui {
    position:absolute; top:0; left:0; right:0; z-index:10;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:14px 20px;
    background:linear-gradient(180deg,rgba(13,17,23,.98) 70%,transparent);
  }
  .ui-title { flex:0 0 auto; }
  h1 { font-size:15px; font-weight:600; color:#e6edf3; letter-spacing:.3px; }
  .subtitle { font-size:11px; color:#7d8590; }

  #search {
    background:#161b22; border:1px solid #30363d; border-radius:6px;
    color:#e6edf3; padding:6px 12px; font-size:13px; width:180px; outline:none;
  }
  #search:focus { border-color:#4ECDC4; }
  #search::placeholder { color:#484f58; }

  .btn {
    background:#21262d; border:1px solid #30363d; border-radius:6px;
    color:#cdd9e5; padding:6px 12px; font-size:12px; cursor:pointer;
    transition:all .15s; white-space:nowrap;
  }
  .btn:hover { background:#30363d; color:#e6edf3; }
  .btn.active { background:#155752; border-color:#4ECDC4; color:#4ECDC4; }

  #stats {
    position:absolute; top:72px; right:20px; z-index:10;
    background:rgba(13,17,23,.92); border:1px solid #30363d;
    border-radius:8px; padding:12px 16px; min-width:180px;
  }
  .stat-row {
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:12px; color:#7d8590; margin-bottom:6px; gap:12px;
  }
  .stat-row:last-child { margin-bottom:0; }
  .stat-val { font-size:15px; font-weight:700; color:#4ECDC4; }
  .stat-val.small { font-size:11px; color:#74B9FF; max-width:110px; text-align:right; }

  #legend {
    position:absolute; bottom:40px; left:20px; z-index:10;
    background:rgba(13,17,23,.9); border:1px solid #30363d;
    border-radius:8px; padding:12px 16px; max-height:55vh; overflow-y:auto;
  }
  .leg-title {
    font-size:11px; color:#7d8590; font-weight:600;
    text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px;
  }
  .leg-item {
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:#cdd9e5; margin-bottom:5px; cursor:pointer;
    transition:opacity .15s;
  }
  .leg-item:hover { color:#fff; }
  .leg-item.muted { opacity:.3; }
  .leg-dot { width:10px; height:10px; border-radius:50%; flex:0 0 10px; }

  #tooltip {
    position:absolute; pointer-events:none; z-index:20;
    background:rgba(13,17,23,.97); border:1px solid #30363d;
    border-radius:8px; padding:12px 16px; font-size:13px;
    opacity:0; transition:opacity .15s; max-width:260px;
  }
  .tt-name  { font-weight:700; font-size:14px; margin-bottom:3px; color:#e6edf3; }
  .tt-meta  { font-size:11px; color:#7d8590; margin-bottom:6px;
              text-transform:uppercase; letter-spacing:.5px; }
  .tt-stat  { font-size:12px; color:#e6edf3; margin-bottom:2px; }
  .tt-phdr  { font-size:10px; color:#7d8590; margin-top:8px; margin-bottom:3px; }
  .tt-plink {
    display:block; font-size:10px; color:#4ECDC4; text-decoration:none;
    margin-top:2px; opacity:.85; line-height:1.4;
  }
  .tt-plink:hover { opacity:1; }
  .tt-ptext { display:block; font-size:10px; color:#7d8590; margin-top:2px; line-height:1.4; }

  #info {
    position:absolute; bottom:16px; right:20px; z-index:10;
    font-size:11px; color:#484f58; text-align:right;
  }

  #loading {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:30;
    background:#0d1117; color:#7d8590; gap:14px;
  }
  .spinner {
    width:36px; height:36px; border:3px solid #30363d;
    border-top-color:#4ECDC4; border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  svg { display:block; }
  .link { stroke-opacity:.28; pointer-events:none; }
  .node circle { cursor:pointer; transition:opacity .2s; }
  .node text {
    pointer-events:none; font-size:10px; fill:#cdd9e5;
    paint-order:stroke; stroke:#0d1117; stroke-width:2.5px;
    stroke-linejoin:round;
  }
  .node.dimmed circle { opacity:.1; }
  .node.dimmed text   { opacity:.07; }
  .link.dimmed { opacity:.04; }

  @media (max-width:640px) {
    #ui { padding:10px 12px; gap:8px; }
    h1  { font-size:13px; }
    #search { width:110px; }
    #legend { display:none; }
    #stats  { top:auto; bottom:40px; right:10px; min-width:130px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Cargando red de coautoría…</div>
</div>

<div id="ui" style="display:none">
  <div class="ui-title">
    <h1>Red de Coautoría · Banxico DIBM</h1>
    <div class="subtitle">Autores con &ge; 2 papers &middot; 1978&ndash;2025</div>
  </div>
  <input id="search" type="text" placeholder="Buscar autor…">
  <button class="btn active" id="btn-all">Todos</button>
  <button class="btn" id="btn-top">Top autores (&ge; 5 papers)</button>
  <button class="btn" id="btn-cluster">Agrupar comunidades</button>
</div>

<div id="stats" style="display:none">
  <div class="stat-row"><span>Nodos</span><span class="stat-val" id="s-nodes">—</span></div>
  <div class="stat-row"><span>Vínculos</span><span class="stat-val" id="s-links">—</span></div>
  <div class="stat-row">
    <span>Más conectado</span>
    <span class="stat-val small" id="s-top">—</span>
  </div>
</div>

<div id="legend" style="display:none">
  <div class="leg-title">Comunidades</div>
  <div id="leg-items"></div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-meta" id="tt-meta"></div>
  <div class="tt-stat" id="tt-stat"></div>
  <div class="tt-phdr">Papers de investigación:</div>
  <div id="tt-papers"></div>
</div>

<div id="info">Scroll: zoom &middot; Arrastrar: mover &middot; Click nodo: resaltar vecinos</div>

<svg id="graph"></svg>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
"use strict";

// Palette
const PALETTE = [
  "#4ECDC4","#74B9FF","#A29BFE","#FFE66D",
  "#FF6B6B","#FD79A8","#00CEC9","#FDCB6E",
  "#6C5CE7","#55EFC4"
];

// Simple CSV parser
function parseCSV(text) {
  const lines = text.replace(/\r/g,'').trim().split('\n');
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur); cur = ''; }
      else { cur += c; }
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    return obj;
  });
}

// Label propagation community detection
function detectCommunities(nodeIds, edgePairs) {
  const community = {};
  nodeIds.forEach((id, i) => { community[id] = i; });
  const adj = {};
  nodeIds.forEach(id => { adj[id] = []; });
  edgePairs.forEach(([a, b]) => {
    (adj[a] = adj[a]||[]).push(b);
    (adj[b] = adj[b]||[]).push(a);
  });
  for (let iter = 0; iter < 25; iter++) {
    const order = [...nodeIds].sort(() => Math.random() - .5);
    let changed = false;
    order.forEach(id => {
      const nbrs = adj[id] || [];
      if (!nbrs.length) return;
      const freq = {};
      nbrs.forEach(nb => { const c = community[nb]; freq[c] = (freq[c]||0)+1; });
      let best = community[id], bestCnt = freq[community[id]] || 0;
      Object.entries(freq).forEach(([c, cnt]) => {
        if (cnt > bestCnt) { best = c; bestCnt = cnt; }
      });
      if (best !== community[id]) { community[id] = best; changed = true; }
    });
    if (!changed) break;
  }
  // Relabel by community size desc
  const sizes = {};
  nodeIds.forEach(id => { const c = community[id]; sizes[c] = (sizes[c]||0)+1; });
  const sorted = Object.entries(sizes).sort((a,b) => b[1]-a[1]).map(([c])=>c);
  const remap = {};
  sorted.forEach((c, i) => { remap[c] = i; });
  nodeIds.forEach(id => { community[id] = remap[community[id]]; });
  return community;
}

// Try pre-generated JSON first, then fall back to CSV computation
const JSON_URL = '../data/coautoria_red.json';
const PA_URL   = '../../data/processed/paper_authors.csv';
const PP_URL   = '../../data/processed/papers.csv';

fetch(JSON_URL)
  .then(r => { if (!r.ok) throw new Error('JSON not found'); return r.json(); })
  .then(data => {
    initUI(data.nodes, data.links, data.meta.n_communities, data.meta.max_degree_author);
  })
  .catch(() => {
    Promise.all([
      fetch(PA_URL).then(r => { if(!r.ok) throw new Error('Cannot load paper_authors.csv'); return r.text(); }),
      fetch(PP_URL).then(r => { if(!r.ok) throw new Error('Cannot load papers.csv'); return r.text(); }),
    ])
    .then(([paText, ppText]) => buildFromCSV(paText, ppText))
    .catch(err => {
      document.getElementById('loading').innerHTML =
        '<div style="color:#FF6B6B;text-align:center;padding:20px">Error al cargar datos:<br><code>'
        + err.message + '</code></div>';
    });
  });

function buildFromCSV(paText, ppText) {
  const paRows = parseCSV(paText);
  const ppRows = parseCSV(ppText);

  // Paper metadata
  const paperMeta = {};
  ppRows.forEach(row => {
    const clave = row.clave;
    if (!clave) return;
    const titulo = row.titulo_ing || row.titulo_esp || clave;
    paperMeta[clave] = {
      clave,
      anio: row.anio ? parseInt(row.anio) : null,
      titulo: titulo.slice(0, 55) + (titulo.length > 55 ? '\u2026' : ''),
      url: row.url_pdf_ing || ''
    };
  });

  // author_id → {nombre, papersSet}
  const authorMap = {};
  paRows.forEach(row => {
    const aid = row.autor_id, clave = row.clave_paper;
    if (!aid || !clave) return;
    if (!authorMap[aid]) authorMap[aid] = { nombre: row.presentacion || aid, papersSet: new Set() };
    authorMap[aid].papersSet.add(clave);
  });

  // Qualified: >= 2 papers
  const qualSet = new Set(Object.keys(authorMap).filter(id => authorMap[id].papersSet.size >= 2));

  // Paper → qualified authors
  const paperQA = {};
  paRows.forEach(row => {
    const aid = row.autor_id, clave = row.clave_paper;
    if (!qualSet.has(aid) || !clave) return;
    if (!paperQA[clave]) paperQA[clave] = [];
    if (!paperQA[clave].includes(aid)) paperQA[clave].push(aid);
  });

  // Co-authorship edge weights
  const edgeMap = {};
  Object.values(paperQA).forEach(authors => {
    for (let i = 0; i < authors.length; i++) {
      for (let j = i+1; j < authors.length; j++) {
        const [a,b] = [authors[i],authors[j]].sort();
        const k = a+'|'+b;
        edgeMap[k] = (edgeMap[k]||0) + 1;
      }
    }
  });

  // Degree
  const degree = {};
  qualSet.forEach(id => { degree[id] = 0; });
  Object.keys(edgeMap).forEach(k => {
    const [a,b] = k.split('|');
    degree[a] = (degree[a]||0)+1;
    degree[b] = (degree[b]||0)+1;
  });

  // Assign integer IDs, sorted by n_papers desc
  const sortedIds = [...qualSet].sort((a,b) =>
    authorMap[b].papersSet.size - authorMap[a].papersSet.size
  );
  const idxMap = {};
  sortedIds.forEach((id, i) => { idxMap[id] = i; });

  // Nodes
  const nodes = sortedIds.map(id => {
    const papers = [...authorMap[id].papersSet].slice(0,5).map(c =>
      paperMeta[c] || { clave:c, anio:null, titulo:c.slice(0,55), url:'' }
    );
    return {
      id: idxMap[id],
      autor_id: id,
      nombre: authorMap[id].nombre,
      n_papers: authorMap[id].papersSet.size,
      grado: degree[id] || 0,
      papers
    };
  });

  // Links
  const links = Object.entries(edgeMap).map(([k, val]) => {
    const [a,b] = k.split('|');
    return { source: idxMap[a], target: idxMap[b], value: val };
  });

  // Community detection
  const comm = detectCommunities(nodes.map(n=>n.id), links.map(l=>[l.source,l.target]));
  nodes.forEach(n => { n.community = comm[n.id] ?? 0; n.color = PALETTE[n.community % PALETTE.length]; });

  const nComm = new Set(nodes.map(n=>n.community)).size;
  const maxDeg = nodes.reduce((best,n) => n.grado > best.grado ? n : best, nodes[0]);

  initUI(nodes, links, nComm, maxDeg ? maxDeg.nombre : '\u2014');
}

function initUI(nodes, links, nComm, maxDegAuthor) {
  // Ensure colors set if coming from JSON
  nodes.forEach(n => {
    if (!n.color) n.color = PALETTE[(n.community || 0) % PALETTE.length];
  });

  document.getElementById('s-nodes').textContent = nodes.length;
  document.getElementById('s-links').textContent = links.length;
  document.getElementById('s-top').textContent   = maxDegAuthor || '\u2014';

  // Legend: group by community
  const commGroups = {};
  nodes.forEach(n => { (commGroups[n.community] = commGroups[n.community]||[]).push(n); });
  const commKeys = Object.keys(commGroups).map(Number)
    .sort((a,b) => commGroups[b].length - commGroups[a].length).slice(0, 8);

  const legContainer = document.getElementById('leg-items');
  legContainer.innerHTML = '';
  commKeys.forEach(c => {
    const rep = commGroups[c].sort((a,b)=>b.n_papers-a.n_papers)[0];
    const firstName = rep ? rep.nombre.split(/[\s\-,]+/)[0] : '';
    const item = document.createElement('div');
    item.className = 'leg-item'; item.dataset.comm = c;
    item.innerHTML = '<div class="leg-dot" style="background:' + PALETTE[c % PALETTE.length]
      + '"></div>Grupo ' + (c+1) + ' \u00b7 ' + firstName;
    legContainer.appendChild(item);
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('ui').style.display      = '';
  document.getElementById('stats').style.display   = '';
  document.getElementById('legend').style.display  = '';

  renderGraph(nodes, links, nComm);
}

function renderGraph(allNodes, allLinks, nComm) {
  const W = window.innerWidth, H = window.innerHeight;
  const svg = d3.select('#graph').attr('width', W).attr('height', H);

  // Cluster positions: grid layout
  const CLUSTER_POS = {};
  const cols = Math.ceil(Math.sqrt(nComm + 1));
  const rows = Math.ceil(nComm / cols);
  for (let c = 0; c < nComm; c++) {
    const col = c % cols, row = Math.floor(c / cols);
    CLUSTER_POS[c] = [
      W * (0.15 + 0.7 * (col + 0.5) / cols),
      H * (0.15 + 0.7 * (row + 0.5) / rows)
    ];
  }

  let clusterMode = false, activeFilter = null, selected = null, showTop = false;

  const rScale = d3.scaleSqrt()
    .domain([0, d3.max(allNodes, d => d.n_papers)])
    .range([4, 28]);

  const g    = svg.append('g');
  const zoom = d3.zoom().scaleExtent([.08, 8])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  const nodes = allNodes.map(d => ({...d}));
  const links = allLinks.map(d => ({...d}));

  const sim = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d=>d.id)
                        .distance(d => Math.max(30, 80 - d.value*5))
                        .strength(.3))
    .force('charge',  d3.forceManyBody().strength(d => -120 - d.n_papers*10))
    .force('center',  d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide(d => rScale(d.n_papers)+6));

  // Links
  const link = g.append('g')
    .selectAll('line').data(links).join('line')
    .attr('class','link')
    .attr('stroke','#30363d')
    .attr('stroke-width', d => Math.sqrt(d.value) * .9);

  // Nodes
  const node = g.append('g')
    .selectAll('g').data(nodes).join('g')
    .attr('class','node')
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('mouseover', showTT)
    .on('mousemove',  moveTT)
    .on('mouseout',   hideTT)
    .on('click',      clickNode);

  node.append('circle')
    .attr('r',      d => rScale(d.n_papers))
    .attr('fill',   d => d.color)
    .attr('stroke', d => d3.color(d.color).darker(1.3))
    .attr('stroke-width', 1.5);

  node.append('text')
    .attr('dy', d => rScale(d.n_papers) + 12)
    .attr('text-anchor','middle')
    .style('display', d => d.n_papers > 3 ? null : 'none')
    .text(d => {
      // Show last surname token of the name
      const parts = d.nombre.split(/[\s,]+/).filter(Boolean);
      return parts.length > 1 ? parts[parts.length-1] : parts[0] || d.nombre;
    });

  sim.on('tick', () => {
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${d.x},${d.y})`);
  });

  // Tooltip
  const tooltip = document.getElementById('tooltip');

  function showTT(e,d) {
    document.getElementById('tt-name').textContent = d.nombre;
    document.getElementById('tt-meta').textContent = 'Comunidad ' + (d.community+1);
    document.getElementById('tt-stat').textContent =
      d.n_papers + ' papers \u00b7 ' + d.grado + ' co-autores directos';
    const papersEl = document.getElementById('tt-papers');
    papersEl.innerHTML = '';
    (d.papers||[]).slice(0,3).forEach(p => {
      const prefix = p.anio ? p.anio+' \u00b7 ' : '';
      const text = prefix + (p.titulo || p.clave || '');
      if (p.url) {
        const a = document.createElement('a');
        a.className='tt-plink'; a.href=p.url; a.target='_blank';
        a.textContent = text; papersEl.appendChild(a);
      } else {
        const s = document.createElement('span');
        s.className='tt-ptext'; s.textContent=text; papersEl.appendChild(s);
      }
    });
    tooltip.style.opacity = 1; moveTT(e);
  }
  function moveTT(e) {
    const tx = Math.min(e.clientX+16, window.innerWidth-270);
    tooltip.style.left = tx+'px';
    tooltip.style.top  = (e.clientY-10)+'px';
  }
  function hideTT() { tooltip.style.opacity = 0; }

  // Click: highlight neighbors
  function clickNode(e,d) {
    e.stopPropagation();
    if (selected===d.id) { clearHL(); selected=null; return; }
    selected = d.id;
    const nb = new Set([d.id]);
    links.forEach(l => {
      const sid = typeof l.source==='object'?l.source.id:l.source;
      const tid = typeof l.target==='object'?l.target.id:l.target;
      if (sid===d.id) nb.add(tid);
      if (tid===d.id) nb.add(sid);
    });
    node.classed('dimmed', n => !nb.has(n.id));
    link.classed('dimmed', l => {
      const sid=typeof l.source==='object'?l.source.id:l.source;
      const tid=typeof l.target==='object'?l.target.id:l.target;
      return !nb.has(sid)||!nb.has(tid);
    });
  }
  svg.on('click',()=>{ clearHL(); selected=null; });
  function clearHL() { node.classed('dimmed',false); link.classed('dimmed',false); }

  // Button: Todos
  document.getElementById('btn-all').addEventListener('click', function() {
    showTop=false;
    document.getElementById('btn-top').classList.remove('active');
    this.classList.add('active');
    node.style('display',null);
    clearHL(); selected=null; activeFilter=null;
    document.querySelectorAll('.leg-item').forEach(x=>x.classList.remove('muted'));
    clusterMode=false;
    document.getElementById('btn-cluster').classList.remove('active');
    sim.force('cluster',null).alpha(.3).restart();
  });

  // Button: Top autores
  document.getElementById('btn-top').addEventListener('click', function() {
    showTop=!showTop;
    this.classList.toggle('active',showTop);
    document.getElementById('btn-all').classList.toggle('active',!showTop);
    node.style('display', d => showTop && d.n_papers<5 ? 'none' : null);
  });

  // Button: Agrupar comunidades
  document.getElementById('btn-cluster').addEventListener('click', function() {
    clusterMode=!clusterMode;
    this.classList.toggle('active',clusterMode);
    if (clusterMode) {
      sim.force('cluster', alpha => {
        nodes.forEach(d => {
          const pos = CLUSTER_POS[d.community]||[W/2,H/2];
          d.vx += (pos[0]-d.x)*alpha*.1;
          d.vy += (pos[1]-d.y)*alpha*.1;
        });
      }).alpha(.5).restart();
    } else {
      sim.force('cluster',null).alpha(.3).restart();
    }
  });

  // Search
  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (!q) {
      node.style('display', d => showTop&&d.n_papers<5?'none':null);
      clearHL(); selected=null; return;
    }
    node.style('display',null);
    const matchIds = new Set(nodes.filter(d=>d.nombre.toLowerCase().includes(q)).map(d=>d.id));
    node.classed('dimmed', d=>!matchIds.has(d.id));
    link.classed('dimmed', l=>{
      const sid=typeof l.source==='object'?l.source.id:l.source;
      const tid=typeof l.target==='object'?l.target.id:l.target;
      return !matchIds.has(sid)&&!matchIds.has(tid);
    });
  });

  // Legend filter
  document.querySelectorAll('.leg-item').forEach(el => {
    el.addEventListener('click', () => {
      const f = parseInt(el.dataset.comm);
      if (activeFilter===f) {
        activeFilter=null;
        document.querySelectorAll('.leg-item').forEach(x=>x.classList.remove('muted'));
        clearHL();
      } else {
        activeFilter=f;
        document.querySelectorAll('.leg-item').forEach(x=>
          x.classList.toggle('muted', parseInt(x.dataset.comm)!==f)
        );
        node.classed('dimmed', d=>d.community!==f);
        link.classed('dimmed', l=>{
          const sn=typeof l.source==='object'?l.source:nodes.find(n=>n.id===l.source);
          const tn=typeof l.target==='object'?l.target:nodes.find(n=>n.id===l.target);
          return !sn||!tn||sn.community!==f||tn.community!==f;
        });
      }
    });
  });

  // Resize
  window.addEventListener('resize', () => {
    const nW=window.innerWidth, nH=window.innerHeight;
    svg.attr('width',nW).attr('height',nH);
    sim.force('center',d3.forceCenter(nW/2,nH/2)).alpha(.1).restart();
  });
}
</script>
</body>
</html>
